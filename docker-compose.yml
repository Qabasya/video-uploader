services:
  video-uploader:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ_NAME:-Europe/Kaliningrad}
    volumes:
      - /mnt/video:/mnt/video
      - ./data:/data
      - ./config:/app/config:ro
    ports:
      - "${API_PORT:-8090}:8090"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os,urllib.request; urllib.request.urlopen('http://localhost:' + os.environ.get('API_PORT', '8090') + '/health', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
